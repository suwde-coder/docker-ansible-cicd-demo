name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repo Checkout
        uses: actions/checkout@v3

      - name: 2. Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: 3 & 4. Docker Image Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/myapp:latest

      - name: 5. Ansible Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Konfigürasyon Dosyalarını Hazırlama (sed ile değiştirme)
        run: |
          sed -i "s/YOUR_SERVER_IP/${{ secrets.SERVER_IP }}/g" ansible/inventory.ini
          sed -i "s/YOUR_DOCKERHUB_USERNAME/${{ secrets.DOCKER_USER }}/g" ansible/deploy.yml

      - name: 6. SSH Private Key Ayarlama
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 7. known_hosts Ayarlama
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: 8. Ansible Playbook Çalıştırma
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
